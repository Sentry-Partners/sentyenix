name: Sentyenix Orchestrator

on:
  push:
    branches: [main]
  issues:
    types: [opened, labeled]
  workflow_dispatch:

jobs:
  detect-and-route:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Detect changes
        id: detect
        run: |
          echo "changed_files=$(git diff --name-only HEAD~1 HEAD | tr '\n' ',')" >> $GITHUB_OUTPUT
          echo "commit_message=$(git log -1 --pretty=format:'%s')" >> $GITHUB_OUTPUT
          
      - name: Create camp spawn issue
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/issue_body.md << 'EOF'
          ## [SPAWN] Camp Activation Request
          
          **Trigger:** Push to main
          **Commit:** ${{ github.sha }}
          **Changed Files:** ${{ steps.detect.outputs.changed_files }}
          **Commit Message:** ${{ steps.detect.outputs.commit_message }}
          
          ### Required Action
          - Analyze changes
          - Determine which camp(s) should respond
          - Spawn multi-lineage camp for review/decision
          - Apply Reflek alignment scoring
          - Report results
          
          ### Auto-Assignment
          - Strategy Camp: Scope assessment
          - Quality Camp: Alignment review
          
          ---
          *This issue was auto-generated by the Sentyenix Orchestrator*
          EOF
          
          gh issue create \
            --title "[SPAWN] Camp activation: ${{ steps.detect.outputs.commit_message }}" \
            --body-file /tmp/issue_body.md \
            --label "spawn,auto,orchestrator" \
            || echo "Issue creation failed (may be permissions)"

      - name: Process camp completion
        if: contains(github.event.issue.labels.*.name, 'camp-complete')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Camp completed - processing results"
          # This would trigger the next phase
          # For now, just log it
          echo "Issue ${{ github.event.issue.number }} marked complete"
