name: Sentyenix Orchestrator

on:
  push:
    branches: [main]
  issues:
    types: [opened, labeled]
  workflow_dispatch:

jobs:
  detect-and-route:
    runs-on: [self-hosted, macOS, ARM64, sentyenix]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -r scripts/requirements.txt
      
      - name: Detect and route
        id: detect
        run: |
          echo "changed_files=${{ join(github.event.head_commit.modified, ',') }}" >> $GITHUB_OUTPUT
          echo 'commit_message<<EOF' >> $GITHUB_OUTPUT
          echo "${{ github.event.head_commit.message }}" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
          
      - name: Create issue for push
        if: github.event_name == 'push'
        id: create_issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_TITLE=$(echo "${{ github.event.head_commit.message }}" | head -n 1)
          ISSUE_URL=$(gh issue create --title "[SPAWN] Push: $COMMIT_TITLE" --body "Auto-generated camp activation for push to main.")
          ISSUE_NUM=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT
          
      - name: Verify CLIs
        run: |
          which claude || echo "Claude CLI not available"
          which codex || echo "Codex CLI not available"
          
      - name: Run orchestrator for push
        if: github.event_name == 'push' && steps.create_issue.outputs.issue_number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source .venv/bin/activate
          python3 scripts/sentyenix_orchestrator.py --mode single --issue ${{ steps.create_issue.outputs.issue_number }}
          
      - name: Check if camp already completed
        if: github.event_name == 'issues'
        id: check_complete
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABELS=$(gh issue view "${{ github.event.issue.number }}" --json labels -q '.labels[].name')
          if echo "$LABELS" | grep -q "camp-complete"; then
            echo "camp-complete label found — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
          
      - name: Run orchestrator for issue
        if: github.event_name == 'issues' && steps.check_complete.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source .venv/bin/activate
          python3 scripts/sentyenix_orchestrator.py --mode single --issue "${{ github.event.issue.number }}"