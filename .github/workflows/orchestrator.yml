name: Sentyenix Orchestrator

on:
  push:
    branches: [main]
  issues:
    types: [opened, labeled]
  workflow_dispatch:

jobs:
  detect-and-route:
    runs-on: [self-hosted, macOS, ARM64, sentyenix]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          python3 -m pip install --user -r scripts/requirements.txt
      
      - name: Detect and route
        id: detect
        run: |
          echo "changed_files=$(git diff --name-only HEAD~1 HEAD | tr '\n' ',')" >> $GITHUB_OUTPUT
          echo "commit_message=$(git log -1 --pretty=format:'%s')" >> $GITHUB_OUTPUT
          
      - name: Spawn camp for push
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/sentyenix_orchestrator.py --mode single --issue ${{ github.event.issue.number || '0' }}
          
      - name: Spawn camp for issue
        if: github.event_name == 'issues'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/sentyenix_orchestrator.py --mode single --issue ${{ github.event.issue.number }}