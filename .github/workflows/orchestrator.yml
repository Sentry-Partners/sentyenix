name: Sentyenix Orchestrator

on:
  push:
    branches: [main]
  issues:
    types: [opened, labeled]
  workflow_dispatch:

jobs:
  detect-and-route:
    runs-on: [self-hosted, macOS, ARM64, sentyenix]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -r scripts/requirements.txt
      
      - name: Detect and route
        id: detect
        run: |
          echo "changed_files=${{ join(github.event.head_commit.modified, ',') }}" >> $GITHUB_OUTPUT
          echo "commit_message=${{ github.event.head_commit.message }}" >> $GITHUB_OUTPUT
          
      - name: Create issue for push
        if: github.event_name == 'push'
        id: create_issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM=$(gh issue create --title "[SPAWN] Push: ${{ github.event.head_commit.message }}" --body "Auto-generated camp activation for push to main." | grep -oE '#[0-9]+' | tr -d '#')
          echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT
          
      - name: Run orchestrator for push
        if: github.event_name == 'push' && steps.create_issue.outputs.issue_number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source .venv/bin/activate
          python3 scripts/sentyenix_orchestrator.py --mode single --issue ${{ steps.create_issue.outputs.issue_number }}
          
      - name: Run orchestrator for issue
        if: github.event_name == 'issues'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source .venv/bin/activate
          python3 scripts/sentyenix_orchestrator.py --mode single --issue ${{ github.event.issue.number }}